name: OKX Kline Update (scheduled)

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: okx-cloud-data-scheduled
  cancel-in-progress: true

jobs:
  update-kline-snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout data repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch updater scripts from cloud-runner
        run: |
          curl -fsSL -o update_okx.py https://raw.githubusercontent.com/Faker2004/re0choice-cloud-runner/main/update_okx.py
          curl -fsSL -o requirements.txt https://raw.githubusercontent.com/Faker2004/re0choice-cloud-runner/main/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run OKX updater
        run: python update_okx.py

      - name: Commit data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "chore: update OKX klines $(date -u +%Y-%m-%dT%H:%MZ)"
          git pull --rebase origin main
          git push

      # GitHub cron 不可靠：成功后 1 小时链式触发下一次
      - name: Chain next run in 1 hour
        if: success()
        env:
          GH_TOKEN: ${{ secrets.CLOUD_DATA_PUSH_TOKEN }}
        run: |
          sleep 3600
          gh workflow run "OKX Kline Update (scheduled)" -R Faker2004/re0choice-cloud-data --ref main
